name: Chinese Food Reels Pipeline

on:
  push:
    branches:
      - master
  schedule:
    # Trigger 6 times a day (every 4 hours)
    # UTC Equivalent: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    name: Chinese Food Reels Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: chinese-food-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🚀 Run Pipeline
        id: main_agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          echo "Starting Chinese Food Reels Pipeline..."
          python main_agent.py

      - name: 💾 Commit updated files
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add downloaded_history.txt || true
          git commit -m "Update download history" || true
          git pull --rebase origin master || true
          git push origin master || true
